include classpath("application.conf")

# ElasticMQ — broker SQS-compatível para dev local (alternativa OSS ao LocalStack).
# O app roda no host e conecta em localhost:9324; as URLs de fila embutem esse host,
# então `node-address.host` precisa bater com o que o cliente usa.
node-address {
  protocol = http
  host = localhost
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
}

queues {
  # Evento interno `CashInConfirmed` (webhook do PSP já normalizado antes de entrar).
  "cash-in" {
    deadLettersQueue {
      name = "cash-in-dlq"
      maxReceiveCount = 5
    }
  }
  # Mensagens envenenadas caem aqui após 5 recebimentos com falha, em vez de
  # reentregar para sempre (PSP + SQS são ambos at-least-once).
  "cash-in-dlq" { }

  # Uma página de recipients: produzida pelo fan-out, consumida pelo payout.
  # O gatilho do fan-out NÃO é uma fila — é a varredura do estado da campanha
  # (status='active' AND fanned_out_at IS NULL). Ver RFC 0002.
  "payout-batch-requested" {
    deadLettersQueue {
      name = "payout-batch-requested-dlq"
      maxReceiveCount = 5
    }
  }
  "payout-batch-requested-dlq" { }
}
