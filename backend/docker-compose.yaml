services:
  postgres:
    image: postgres:16-alpine
    container_name: perkly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-perkly}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - perkly-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-perkly}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  perkly-pgdata:
